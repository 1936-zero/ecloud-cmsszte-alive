# Optional override: Linux host network (better CAG mint / Path B latency).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.host.yml up -d --build
#
# Windows / macOS Docker Desktop: host network is NOT equivalent to Linux;
# stay on default bridge + ports:8081 (docker-compose.yml only).
services:
  ecloud-keepalive:
    network_mode: host
    # host network: published ports are ignored / invalid — clear mapping
    ports: !reset []
