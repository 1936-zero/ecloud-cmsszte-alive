; Portable installinfo for Docker / CI / machines without full CMSS client.
; Path B mint/decode needs [PublicKey].csap_id (16-char AES-128 key).
; This is the product client config key (ships in official installinfo.ini),
; NOT a user password / account secret. Observed CMSS client value.
; Override mount with host official ini when you need a different build:
;   INSTALLINFO_HOST=/path/to/real/installinfo.ini docker compose up -d
;
; Section name MUST be PublicKey (not [install]) — see l3/aes_decode_connstr.py
[PublicKey]
csap_id=3fec8a54-7e49-48
