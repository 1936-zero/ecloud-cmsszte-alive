services:
  ecloud-keepalive:
    build: .
    image: ecloud-cmsszte-alive:local
    container_name: ecloud-cmsszte-alive
    user: "1000:1000"
    # CAG mint (cs_suOperDesktop) times out on bridge NAT; host net matches CLI.
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      HOME: /tmp
      CLOUD_PC_CONFIG_FILE: /app/data/cloud_pc.json
      # Docker-safe plain (HOME=/ would break ~/.cache); host can docker cp / remint
      SHORT_CONNECT_PLAIN_FILE: /tmp/r26_t29_plain
      OUT_DIR: /tmp/ecloud-pathb/reports/spice_oracle_webui
      # product line pins (never jtydn / aijia)
      PIN_PRODUCT_LINE: public_ecloud_9222
    volumes:
      - ./data:/app/data
      # installinfo: default stub (HTTP-only OK). For Path B SPICE set:
      #   INSTALLINFO_HOST=/opt/apps/com.cmss.saas.ecloudcomputer/files/drivers/CMSS/config/installinfo.ini
      - ${INSTALLINFO_HOST:-./docker/stubs/installinfo.ini}:/opt/apps/com.cmss.saas.ecloudcomputer/files/drivers/CMSS/config/installinfo.ini:ro
    # host network: NO ports: mapping; process binds host :8081 directly
    # ensure ./data is writable by uid 1000 (mkdir -p data && chown 1000:1000 data)
    restart: unless-stopped
    command: ["web", "--host", "0.0.0.0", "--port", "8081"]
