services:
  ecloud-keepalive:
    build: .
    image: ecloud-cmsszte-alive:local
    container_name: ecloud-cmsszte-alive
    user: "1000:1000"
    # Default: host network (Linux) — Path B / CAG mint 与 CLI 同源路由，避免 bridge NAT 下 8899 读超时。
    # Windows / macOS Docker Desktop: host 网络不等于 Linux，请改用 bridge 覆盖：
    #   docker compose -f docker-compose.yml -f docker-compose.bridge.yml up -d --build
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      HOME: /tmp
      CLOUD_PC_CONFIG_FILE: /app/data/cloud_pc.json
      # #75fixan P1-1: do NOT set SHORT_CONNECT_PLAIN_FILE here.
      # Web multi-card uses per-account plain under data/web_accounts/<id>/.
      # Global env plain is CLI single-account fallback only (serial credential risk).
      OUT_DIR: /tmp/ecloud-pathb/reports/spice_oracle_webui
      # product line pins (never jtydn / aijia)
      PIN_PRODUCT_LINE: public_ecloud_9222
    volumes:
      # Named volume (default): no host chown; avoids Debian bind-mount 500.
      # Optional bind to ./data for visible files / CLI share:
      #   docker compose -f docker-compose.yml -f docker-compose.bind.yml up -d
      - ecloud_data:/app/data
      # installinfo [PublicKey].csap_id required for connectStr mint/decode (Path B).
      # Default: repo stub with product csap_id (same key as official client PublicKey).
      # Override with host official ini if needed:
      #   INSTALLINFO_HOST=/opt/apps/com.cmss.saas.ecloudcomputer/files/drivers/CMSS/config/installinfo.ini
      #   docker compose up -d
      - ${INSTALLINFO_HOST:-./docker/stubs/installinfo.ini}:/opt/apps/com.cmss.saas.ecloudcomputer/files/drivers/CMSS/config/installinfo.ini:ro
    # host 网络下 ports: 映射无效，WebUI 直接听宿主机 0.0.0.0:8081
    restart: unless-stopped
    command: ["web", "--host", "0.0.0.0", "--port", "8081"]

volumes:
  ecloud_data:
